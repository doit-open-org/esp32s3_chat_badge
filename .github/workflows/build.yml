name: ESP-IDF Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esp-idf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Static repository checks
        shell: bash
        run: python3 tools/check_repo.py

      - name: Build ESP32-S3 Chat Badge
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          ./tools/build.sh
          ./tools/merge_bin.sh

      - name: Collect firmware artifacts
        shell: bash
        run: |
          mkdir -p release
          cp build/merged-binary.bin release/esp32s3_chat_badge_merged.bin
          cp build/merged-binary.bin.sha256 release/esp32s3_chat_badge_merged.bin.sha256
          cp build/xiaozhi.bin release/
          cp build/bootloader/bootloader.bin release/
          cp build/partition_table/partition-table.bin release/
          cp build/flasher_args.json release/
          if [[ -f build/flash_args ]]; then cp build/flash_args release/; fi
          printf '%s\n' "${GITHUB_SHA}" > release/GIT_COMMIT

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-chat-badge-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 30
